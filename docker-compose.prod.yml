services:
  mintel_postgres:
    image: postgres:16
    container_name: mintel_postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=4GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=512MB
    env_file:
      - path: ./.env.prod
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mintel}
      POSTGRES_USER: ${POSTGRES_USER:-mintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mintel} -d $${POSTGRES_DB:-mintel}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - mintel_net

  mintel_api:
    build: .
    image: ${MINTEL_APP_IMAGE:-mintel-api:prod}
    container_name: mintel_api
    restart: unless-stopped
    env_file:
      - path: ./.env.prod
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: ${TZ:-America/Chicago}
    ports:
      - "${MINTEL_PORT:-8009}:8007"
    depends_on:
      mintel_postgres:
        condition: service_healthy
    volumes:
      - ./data/logs:/data/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --proxy-headers --forwarded-allow-ips '*' --workers ${MINTEL_UVICORN_WORKERS:-4} --limit-concurrency ${MINTEL_LIMIT_CONCURRENCY:-400} --timeout-keep-alive ${MINTEL_KEEP_ALIVE:-5}
    networks:
      - mintel_net

networks:
  mintel_net:
    name: mintel_prod
