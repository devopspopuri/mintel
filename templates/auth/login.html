<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Mintel</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f7fa; color: #17202a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .login { width: min(420px, calc(100vw - 32px)); background: #fff; border: 1px solid #dbe1ea; border-radius: 8px; padding: 24px; }
      h1 { margin: 0 0 6px; font-size: 28px; }
      p { margin: 0 0 20px; color: #64748b; }
      label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 6px; }
      input { width: 100%; min-height: 42px; border: 1px solid #dbe1ea; border-radius: 6px; padding: 8px 10px; font: inherit; box-sizing: border-box; }
      button { width: 100%; min-height: 42px; border: 0; border-radius: 6px; background: #0f766e; color: #fff; font-weight: 800; margin-top: 18px; cursor: pointer; }
      .error { color: #b42318; font-size: 14px; margin-top: 12px; }
      .hint { font-size: 13px; color: #64748b; margin-top: 16px; }
    </style>
  </head>
  <body>
    <form class="login" method="post" action="/login">
      <h1>Mintel</h1>
      <p>Company intelligence workspace</p>
      <input type="hidden" name="next" value="{{ next }}">
      <label>Email</label>
      <input name="email" type="email" autocomplete="email" required autofocus>
      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password" required>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <button type="submit">Login</button>
      <div class="hint">Default local admin: admin@mintel.local / admin123</div>
    </form>
  </body>
</html>
