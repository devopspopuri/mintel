<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access denied | Mintel</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f7fa; color: #17202a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { width: min(460px, calc(100vw - 32px)); background: #fff; border: 1px solid #dbe1ea; border-radius: 8px; padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { color: #64748b; line-height: 1.5; }
      a { display: inline-flex; align-items: center; min-height: 36px; border-radius: 6px; border: 1px solid #0f766e; background: #0f766e; color: #fff; padding: 0 12px; text-decoration: none; font-weight: 750; }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Access denied</h1>
      <p>{{ message or "Your current role does not allow this action." }}</p>
      <a href="/dashboard">Back to Dashboard</a>
    </main>
  </body>
</html>
